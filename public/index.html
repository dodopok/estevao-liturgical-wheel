<script>
const CX = 0, CY = 0;
const R_MONTHS_INNER  = 105;
const R_MONTHS_OUTER  = 122;
const R_ENTRIES_INNER = 125;
const R_ENTRIES_OUTER = 340;
const R_SEASONS_INNER = 340;
const R_SEASONS_OUTER = 368;

// Trecho do raio em que o nome da celebração é escrito, e os limites de corpo.
const ENTRY_LABEL_OUTER  = R_ENTRIES_OUTER - 13;
const ENTRY_LABEL_INNER  = R_ENTRIES_INNER + 16;
const ENTRY_LABEL_LENGTH = ENTRY_LABEL_OUTER - ENTRY_LABEL_INNER;
const ENTRY_FONT_MAX = 6.5;
const ENTRY_FONT_MIN = 3.6;

const COLOR_MAP = {
  "branco": "#F5EDD8", "verde": "#3B6E34", "roxo": "#5B2D86",
  "violeta": "#5B2D86", "vermelho": "#AB1F1F", "rosa": "#CC6B88",
  "preto": "#333333", "dourado": "#D4B86A"
};

const SEASON_COLORS = {
  "season-advent": "#6F1F52", "season-christmas": "#F5EDD8",
  "season-epiphany": "#4A7C59", "season-lent": "#6F1F52",
  "season-holy-week": "#A82832", "season-easter": "#F5EDD8",
  "season-ordinary-time": "#4A7C59"
};

const MONTH_NAMES = [
  "JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO",
  "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"
];
const MONTH_ABBR = ["JAN", "FEV", "MAR", "ABR", "MAI", "JUN", "JUL", "AGO", "SET", "OUT", "NOV", "DEZ"];

const SVG_NS = "http://www.w3.org/2000/svg";
const svg = document.querySelector("svg.wheel");
let idCounter = 0;
const uid = () => `p${idCounter++}`;

// Nomes de celebração escritos ao longo do raio. O corpo do texto é medido em
// vez de estimado pela contagem de caracteres: a largura depende dos glifos, e
// tudo que passa do fim do caminho o SVG simplesmente não desenha — era o que
// truncava nomes longos como "Anunciação de Nosso Senhor Jesus Cristo à Bem
// Aventurada Virgem Maria".
let entryLabels = [];

function fitEntryLabels() {
  entryLabels.forEach(({ t, tp }) => {
    t.setAttribute("font-size", ENTRY_FONT_MAX);
    tp.removeAttribute("textLength");
    tp.removeAttribute("lengthAdjust");

    const width = t.getComputedTextLength();
    if (width <= ENTRY_LABEL_LENGTH) return;

    const size = ENTRY_FONT_MAX * ENTRY_LABEL_LENGTH / width;
    t.setAttribute("font-size", Math.max(ENTRY_FONT_MIN, +size.toFixed(2)));

    // Nome longo a ponto de não caber nem no corpo mínimo: condensa o traçado,
    // que ainda é legível, em vez de deixar o fim do nome sumir.
    if (size < ENTRY_FONT_MIN) {
      tp.setAttribute("textLength", ENTRY_LABEL_LENGTH);
      tp.setAttribute("lengthAdjust", "spacingAndGlyphs");
    }
  });
}

function polar(r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: CX + r * Math.cos(rad), y: CY + r * Math.sin(rad) };
}

function wedgePath(rIn, rOut, a1, a2) {
  const p1 = polar(rOut, a1), p2 = polar(rOut, a2);
  const p3 = polar(rIn, a2),  p4 = polar(rIn, a1);
  const lg = Math.abs(a2 - a1) > 180 ? 1 : 0;
  return `M${p1.x},${p1.y} A${rOut},${rOut} 0 ${lg} 1 ${p2.x},${p2.y} L${p3.x},${p3.y} A${rIn},${rIn} 0 ${lg} 0 ${p4.x},${p4.y}Z`;
}

function arcPath(r, a1, a2, flip) {
  if (flip) {
    const s = polar(r, a2), e = polar(r, a1);
    const lg = Math.abs(a2 - a1) > 180 ? 1 : 0;
    return `M${s.x},${s.y} A${r},${r} 0 ${lg} 0 ${e.x},${e.y}`;
  }
  const s = polar(r, a1), e = polar(r, a2);
  const lg = Math.abs(a2 - a1) > 180 ? 1 : 0;
  return `M${s.x},${s.y} A${r},${r} 0 ${lg} 1 ${e.x},${e.y}`;
}

function el(tag, attrs, parent) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k,v] of Object.entries(attrs||{})) e.setAttribute(k, v);
  (parent || svg).appendChild(e);
  return e;
}

function textOnArc(pathD, txt, fontSize, fill, fontFamily, fontWeight, letterSpacing) {
  const id = uid();
  el("path", { id, d: pathD, fill: "none" });
  const t = el("text", {
    fill, "font-family": fontFamily || "'Cinzel', serif",
    "font-size": fontSize, "font-weight": fontWeight || "600",
    "letter-spacing": letterSpacing || "0",
    // Sem isto é a linha de base que fica sobre o arco, e os glifos crescem
    // todos para um lado — para fora na metade de cima, para dentro na de
    // baixo (onde o arco é invertido). Centraliza a caixa sobre o arco nas
    // duas direções, deixando o texto na mesma faixa em toda a volta.
    "dominant-baseline": "central"
  });
  const tp = document.createElementNS(SVG_NS, "textPath");
  tp.setAttribute("href", `#${id}`);
  tp.setAttribute("startOffset", "50%");
  tp.setAttribute("text-anchor", "middle");
  tp.textContent = txt;
  t.appendChild(tp);
  svg.appendChild(t);
}

function dateToAngle(dateStr, totalDays, startDate) {
  const d = new Date(dateStr + 'T12:00:00Z');
  const diffTime = d - startDate;
  const dayIndex = diffTime / (1000 * 60 * 60 * 24);
  return (dayIndex * (360 / totalDays));
}

async function fetchApi(endpoint, year, pb) {
  const resp = await fetch(`/api/${year}/${endpoint}?pb=${encodeURIComponent(pb)}`);
  if (!resp.ok) throw new Error(`API error: ${resp.status}`);
  return resp.json();
}

// Número do Próprio (RCL) de um domingo do Tempo Comum. O Próprio é ancorado em
// data fixa, independente da Páscoa: o Próprio 3 cai no domingo mais próximo de
// 25/mai, e cada Próprio seguinte avança uma semana. Como o domingo já está a no
// máximo 3 dias da âncora, arredondar a diferença em semanas devolve o número
// exato — confere com o `properWeek` da Estêvão API.
function properNumber(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');
  const anchor = Date.UTC(d.getUTCFullYear(), 4, 25, 12, 0, 0); // 25 de maio (Próprio 3)
  const weeks = Math.round((d - anchor) / (7 * 24 * 60 * 60 * 1000));
  return 3 + weeks;
}

function renderWheel(overview, overviewPrev, celebrationsCurr, celebrationsPrev, keyDatesPrev) {
  svg.innerHTML = '';
  entryLabels = [];

  const advent1PrevDate = keyDatesPrev.first_sunday_of_advent?.date;
  const advent1CurrDate = overview.key_dates?.first_sunday_of_advent?.date;
  // Sem as duas datas não há como calcular a volta. Lança em vez de desistir
  // em silêncio, que deixava a roda em branco com o painel dizendo "Concluído!".
  if (!advent1PrevDate || !advent1CurrDate) {
    throw new Error('Resposta sem first_sunday_of_advent: não dá para delimitar o ano litúrgico');
  }

  const startDate = new Date(advent1PrevDate + 'T12:00:00Z');
  const endDate = new Date(advent1CurrDate + 'T12:00:00Z');
  endDate.setUTCDate(endDate.getUTCDate() - 1);

  const totalDays = Math.round((endDate - startDate) / (1000*60*60*24)) + 1;

  // --- 1. COLLECT ALL ENTRIES ---
  const allCelebrations = [...(celebrationsPrev || []), ...(celebrationsCurr || [])];
  const renderedEntries = [];

  for (let i = 0; i < totalDays; i++) {
    const d = new Date(startDate);
    d.setUTCDate(d.getUTCDate() + i);
    const ds = d.toISOString().split('T')[0];
    const isSunday = d.getUTCDay() === 0;
    const dayCelebs = allCelebrations.filter(c => c.date === ds);
    const importantCeleb = dayCelebs.find(c => ['principal_feast', 'major_holy_day', 'sunday'].includes(c.type));
    const sundayEvent = isSunday ? (dayCelebs.find(c => c.type === 'sunday') || { name: "DOMINGO", color: "verde", type: "sunday" }) : null;
    const entry = importantCeleb || sundayEvent;
    if (entry && (['principal_feast', 'major_holy_day', 'sunday'].includes(entry.type) || isSunday)) {
      renderedEntries.push({ ...entry, index: i, dateStr: ds });
    }
  }

  // --- 2. EQUAL-SLOT LAYOUT ---
  const N = renderedEntries.length;
  const slotAngle = 360 / N;
  const gap = 0;

  // --- 3. SEASONS RING ---
  const allSeasons = [...(overviewPrev.seasons || []), ...(overview.seasons || [])];
  const seenSeasons = new Set();
  const sortedSeasons = allSeasons
    .filter(s => { const k = s.slug + s.start_date; if (seenSeasons.has(k)) return false; seenSeasons.add(k); return true; })
    .sort((a, b) => a.start_date.localeCompare(b.start_date));

  renderedEntries.forEach(entry => {
    entry._season = sortedSeasons.find(s => entry.dateStr >= s.start_date && entry.dateStr <= s.end_date) || null;
  });
  renderedEntries.forEach((entry, idx) => {
    if (entry._season) return;
    for (let j = idx - 1; j >= 0; j--) { if (renderedEntries[j]._season) { entry._season = renderedEntries[j]._season; return; } }
    for (let j = idx + 1; j < N; j++) { if (renderedEntries[j]._season) { entry._season = renderedEntries[j]._season; return; } }
  });

  const SEASON_ENTRY_COLOR = {
    "season-advent": "violeta", "season-christmas": "branco",
    "season-epiphany": "verde",  "season-lent": "violeta",
    "season-holy-week": "vermelho", "season-easter": "branco",
    "season-ordinary-time": "verde"
  };
  renderedEntries.forEach(entry => {
    if (entry.type === 'sunday' && entry._season) {
      const c = SEASON_ENTRY_COLOR[entry._season.slug];
      if (c) entry.color = c;
    }
  });

  const seasonGroups = [];
  let curGroup = null;
  renderedEntries.forEach((entry, idx) => {
    const slug = entry._season?.slug || '_none';
    if (!curGroup || curGroup.slug !== slug) {
      curGroup = { slug, season: entry._season, startIdx: idx, endIdx: idx };
      seasonGroups.push(curGroup);
    } else { curGroup.endIdx = idx; }
  });
  // Um único caminho por estação — wedges por dia deixavam frestas de antialiasing no PDF
  seasonGroups.forEach(g => {
    const color = SEASON_COLORS[g.season?.slug] || "#4A7C59";
    const d = wedgePath(R_SEASONS_INNER, R_SEASONS_OUTER, g.startIdx * slotAngle, (g.endIdx + 1) * slotAngle);
    el("path", { d, fill: color, stroke: color, "stroke-width": "0.3" });
  });

  seasonGroups.forEach((g, gi) => {
    const a1 = g.startIdx * slotAngle;
    const a2 = (g.endIdx + 1) * slotAngle;
    // Sem separador entre as estações: a ordem do ano litúrgico faz com que
    // duas estações vizinhas nunca tenham a mesma cor, então a troca de cor já
    // delimita. A linha branca de 1.5 que havia aqui destoava dos fios
    // dourados do resto do desenho e lia como um rasgo sobre as cores escuras.
    if (!g.season) return;
    const color = SEASON_COLORS[g.season.slug] || "#4A7C59";
    const textColor = (color === "#F5EDD8") ? "#b8943e" : "#fff";
    const mid = (a1 + a2) / 2;
    const flip = mid > 90 && mid < 270;
    textOnArc(arcPath((R_SEASONS_INNER + R_SEASONS_OUTER) / 2, a1 + 1, a2 - 1, flip), g.season.name.toUpperCase(), "10", textColor, "'Cinzel', serif", "700", "4");
  });

  // --- 4. MONTHS RING (computed here, drawn after decoration) ---
  let lastMonthKey = '';
  const monthSlots = [];
  renderedEntries.forEach((entry, idx) => {
    const [y, m] = entry.dateStr.split('-');
    const k = `${y}-${m}`;
    if (k !== lastMonthKey) {
      if (monthSlots.length > 0) monthSlots[monthSlots.length - 1].endIdx = idx - 1;
      monthSlots.push({ abbr: MONTH_ABBR[parseInt(m) - 1], startIdx: idx, endIdx: N - 1 });
      lastMonthKey = k;
    }
  });
  for (let i = monthSlots.length - 1; i >= 0; i--) {
    if (monthSlots[i].endIdx - monthSlots[i].startIdx + 1 < 3) {
      const next = monthSlots[i + 1];
      const prev = monthSlots[i - 1];
      if (next) next.startIdx = monthSlots[i].startIdx;
      else if (prev) prev.endIdx = monthSlots[i].endIdx;
      monthSlots.splice(i, 1);
    }
  }

  // --- 5. ENTRY WEDGES ---
  renderedEntries.forEach((entry, idx) => {
    const a1   = idx * slotAngle + gap;
    const a2   = (idx + 1) * slotAngle - gap;
    const midA = (idx + 0.5) * slotAngle;

    const bg   = COLOR_MAP[entry.color?.toLowerCase()] || "#F5EDD8";
    const text = (bg === "#F5EDD8") ? "#4a3a1e" : "#fff";

    el("path", { d: wedgePath(R_ENTRIES_INNER, R_ENTRIES_OUTER, a1, a2), fill: bg, stroke: "#fff", "stroke-width": "0.5" });

    // Domingos verdes do Tempo Comum (pós-Pentecostes) recebem o Próprio na
    // frente. Festas principais que caem no domingo (Cristo Rei, Todos os
    // Santos) têm type !== 'sunday' e ficam de fora, como no Ordo.
    let baseName = entry.name || "DOMINGO";
    if (entry.type === 'sunday' && entry._season?.slug === 'season-ordinary-time') {
      baseName = `Próprio ${properNumber(entry.dateStr)} - ${baseName}`;
    }
    const displayName = baseName.toUpperCase();

    const needsFlip = midA < 180;
    const ptOuter = polar(ENTRY_LABEL_OUTER, midA);
    const ptInner = polar(ENTRY_LABEL_INNER, midA);

    const pathId = uid();
    el("path", { id: pathId, d: `M${ptOuter.x},${ptOuter.y} L${ptInner.x},${ptInner.y}`, fill: "none" });

    const textContent = needsFlip ? [...displayName].reverse().join('') : displayName;
    const textAttrs = {
      fill: text, "font-family": "'Cinzel', serif",
      "font-size": ENTRY_FONT_MAX, "font-weight": "700", "dominant-baseline": "central"
    };
    if (needsFlip) textAttrs.rotate = "180";

    const t = el("text", textAttrs);
    const tp = document.createElementNS(SVG_NS, "textPath");
    tp.setAttribute("href", `#${pathId}`);
    tp.setAttribute("startOffset", "0%");
    tp.textContent = textContent;
    t.appendChild(tp);
    entryLabels.push({ t, tp });

    // Day number — inner arc, just inside entries ring
    const dayNum = entry.dateStr.split('-')[2].replace(/^0/, '');
    const flip2 = midA > 90 && midA < 270;
    textOnArc(arcPath(R_ENTRIES_INNER + 8, a1 + 0.3, a2 - 0.3, flip2), dayNum, "7", text, "'Cinzel', serif", "700", "0.5");
  });

  // --- 6. DECORATION & CENTER ---
  [R_ENTRIES_INNER, R_ENTRIES_OUTER, R_SEASONS_INNER, R_SEASONS_OUTER].forEach(r =>
    el("circle", { cx: 0, cy: 0, r, fill: "none", stroke: "#c9a94e", "stroke-width": "0.8", opacity: "0.6" })
  );
  el("circle", { cx: 0, cy: 0, r: R_ENTRIES_INNER-2, fill: "#fdfaf0", stroke: "#c9a94e", "stroke-width": "1.5" });

  // Months ring drawn on top of center circle
  monthSlots.forEach(m => {
    const a1 = m.startIdx * slotAngle;
    const a2 = (m.endIdx + 1) * slotAngle;
    el("path", { d: wedgePath(R_MONTHS_INNER, R_MONTHS_OUTER, a1, a2), fill: "#ede5d0", stroke: "#c9b98a", "stroke-width": "0.4" });
    const mid = (a1 + a2) / 2;
    const flip = mid > 90 && mid < 270;
    textOnArc(arcPath((R_MONTHS_INNER + R_MONTHS_OUTER) / 2, a1, a2, flip), m.abbr, "7", "#8a7650", "'Cinzel', serif", "600", "1");
  });

  el("text", { x: 0, y: 0, fill: "#a08030", "font-family": "'Cinzel Decorative', serif", "font-size": "14", "text-anchor": "middle", "dominant-baseline": "central", "letter-spacing": "2" }).textContent = "AGNUS DEI";

  const irR = (78 + 102) / 2;
  const irId = uid();
  const irPath = `M${polar(irR, 180).x},${polar(irR, 180).y} A${irR},${irR} 0 1 1 ${polar(irR, 180).x + 0.1},${polar(irR, 180).y}`;
  el("path", { id: irId, d: irPath, fill: "none" });
  const irText = el("text", { fill: "#8a6e2f", "font-family": "'Cinzel', serif", "font-size": "7", "letter-spacing": "2.5" });
  const irTp = document.createElementNS(SVG_NS, "textPath");
  irTp.setAttribute("href", `#${irId}`);
  irTp.setAttribute("startOffset", "50%");
  irTp.setAttribute("text-anchor", "middle");
  irTp.textContent = "EIS O CORDEIRO DE DEUS, QUE TIRA O PECADO DO MUNDO";
  irText.appendChild(irTp);

  fitEntryLabels();
  // A medição só vale com a Cinzel já carregada; com a fonte de fallback as
  // larguras saem diferentes, então refaz o ajuste quando ela chegar.
  document.fonts.ready.then(fitEntryLabels);
}

const loadingEl = () => document.getElementById('loading');

function showLoading(msg) {
  const l = loadingEl();
  l.classList.remove('is-done', 'is-error');
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading-retry').hidden = true;
}

function hideLoading() {
  loadingEl().classList.add('is-done');
}

function failLoading(msg) {
  const l = loadingEl();
  l.classList.remove('is-done');
  l.classList.add('is-error');
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading-retry').hidden = false;
}

async function generate() {
  const year = document.getElementById('inp-year').value;
  const pb = document.getElementById('inp-pb').value;
  const status = document.getElementById('status');
  status.textContent = "Buscando dados...";
  showLoading("Gerando o calendário…");
  window._wheelReady = false;
  try {
    const [overview, keyDatesPrev, overviewPrev, celebrationsCurr, celebrationsPrev] = await Promise.all([
      fetchApi('overview', year, pb),
      fetchApi('key_dates', parseInt(year)-1, pb),
      fetchApi('overview', parseInt(year)-1, pb),
      fetchApi('celebrations', year, pb),
      fetchApi('celebrations', parseInt(year)-1, pb),
    ]);
    document.getElementById('sub-title').textContent = `Calendário do Ano Cristão ${parseInt(year) - 1} – ${year}`;
    renderWheel(overview, overviewPrev, celebrationsCurr, celebrationsPrev, keyDatesPrev);
    status.textContent = "Concluído!";
    window._wheelReady = true;
    hideLoading();
  } catch (err) {
    status.textContent = "Erro ao buscar dados da API.";
    console.error(err);
    failLoading("Não foi possível gerar o calendário. Verifique a conexão e tente de novo.");
  }
}

// Formatos ISO 216 em mm — a escala é relativa ao A3, o layout original.
const PAPER_SIZES = {
  A1: { w: 594, h: 841 },
  A2: { w: 420, h: 594 },
  A3: { w: 297, h: 420 },
  A4: { w: 210, h: 297 }
};

const cm = mm => (mm / 10).toFixed(1).replace('.', ',');

// O resto do layout de impressão é proporcional (ver @media print no <style>),
// então só o tamanho do papel precisa ser injetado aqui.
function applyPaper(fmt) {
  const p = PAPER_SIZES[fmt];
  // Dimensões explícitas, não o nome do formato: o CSS só define os keywords
  // A5/A4/A3/B5/B4/letter/legal/ledger — "A2" e "A1" são inválidos e fazem o
  // browser descartar a regra inteira e imprimir no papel padrão dele.
  document.getElementById('print-size').textContent =
    `@media print { @page { size: ${p.w}mm ${p.h}mm; margin: 0; } }`;
}

function buildPdfMenu() {
  const menu = document.getElementById('pdf-menu');
  menu.innerHTML = Object.entries(PAPER_SIZES).map(([fmt, p]) =>
    `<button type="button" data-fmt="${fmt}">
       <span class="fmt">${fmt}</span>
       <span class="dim">${cm(p.w)} × ${cm(p.h)} cm</span>
     </button>`).join('');
  menu.querySelectorAll('button').forEach(b =>
    b.addEventListener('click', () => downloadPdf(b.dataset.fmt)));
}

function togglePdfMenu(force) {
  const menu = document.getElementById('pdf-menu');
  const open = force !== undefined ? force : menu.hidden;
  menu.hidden = !open;
  document.getElementById('btn-pdf').setAttribute('aria-expanded', String(open));
}

function downloadPdf(fmt) {
  applyPaper(fmt);
  togglePdfMenu(false);
  window.print();
}

document.addEventListener('click', e => {
  if (!e.target.closest('#pdf-wrap')) togglePdfMenu(false);
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') togglePdfMenu(false);
});

buildPdfMenu();
applyPaper('A3');

// Auto-generate when loaded by Puppeteer for PDF export
const _params = new URLSearchParams(location.search);
if (_params.get('autoGenerate')) {
  document.getElementById('inp-year').value = _params.get('year') || '2026';
  document.getElementById('inp-pb').value = _params.get('pb') || 'loc_2015';
  generate();
} else {
  generate();
}
</script>
